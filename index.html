<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/css/root.css">
    <link rel="stylesheet" href="./src/css/header.css">
    <link rel="stylesheet" href="./src/css/hero.css">
    <title>Meu Currículo | Seu Nome</title>
</head>

<body>

    <!-- start container -->
    <div class="container">

        <!-- start header -->
        <header class="navbar">
            <div class="navbar__brand">
                <span class="brand-square"></span>
                <div class="brand-text">
                    <h1>Giovanny Costa</h1>
                    <span class="brand-role">/ Desenvolvedor BackEnd</span>
                </div>
            </div>

            <button class="hamburger" id="hamburger-btn" aria-label="Abrir Menu">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="navbar__menu" id="navbar-menu">
                <nav>
                    <ul class="nav-links">
                        <li><a href="/index.html">Home</a></li>
                        <li><a href="/about.html">Sobre Mim</a></li>
                        <li><a href="#curriculo">Currículo</a></li>
                        <li><a href="#projetos">Projetos</a></li>
                        <li><a class="links--contact" href="#contato">Contato</a></li>
                    </ul>
                </nav>

                <!-- todo: dark mode/light mode -->
                <!-- <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label> -->
            </div>
        </header>
        <!-- end header -->

        <!-- start main -->
        <main class="content">
            <section class="hero">
                <div class="hero__container">
                    <div class="hero__text-content">
                        <p class="hero__intro">Eu sou Giovanny Costa</p>
                        <h1 class="hero__title">
                            <span class="typewriter-text"></span><span class="cursor">&nbsp;</span>
                        </h1>

                        <ul class="hero__contact-list">
                            <li>
                                <i class="fa-regular fa-envelope"></i>
                                <span>gioreizon@gmail.com</span>
                            </li>
                            <li>
                                <i class="fa-solid fa-phone"></i>
                                <span>+55 (92) 984821948</span>
                            </li>
                            <li>
                                <i class="fa-solid fa-location-dot"></i>
                                <span>Manaus, Brasil</span>
                            </li>
                        </ul>

                        <div class="hero__socials">
                            <a href="https://www.linkedin.com/in/gioenv" target="_blank" rel="noopener noreferrer"
                                class="icon-container">
                                <span class="tooltip">LinkedIn</span>
                                <i class="fa-brands fa-linkedin-in linkedin"></i>
                            </a>
                            <a href="https://www.instagram.com/gio.env/" target="_blank" rel="noopener noreferrer"
                                class="icon-container">
                                <span class="tooltip">Instagram</span>
                                <i class="fa-brands fa-instagram instagram"></i>
                            </a>
                            <a href="https://github.com/GiovannyCosta" target="_blank" rel="noopener noreferrer"
                                class="icon-container">
                                <span class="tooltip">Github</span>
                                <i class="fa-brands fa-github github"></i>
                            </a>
                            <a href="https://codepen.io/gioEnv" target="_blank" rel="noopener noreferrer"
                                class="icon-container">
                                <span class="tooltip">CodePen</span>
                                <i class="fa-brands fa-codepen codepen"></i>
                            </a>
                        </div>
                    </div>

                    <div class="hero__image-content">
                        <div class="image-wrapper">
                            <img src="https://github.com/giovannyCosta.png" alt="Giovanny Costa">
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <!-- end main -->
    </div>
    <!-- end container -->

    <script src="./src/js/Typewriter.js"></script>
    <script src="./src/js/activeMenu.js"></script>

</html>
